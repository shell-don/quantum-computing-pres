<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="L'informatique quantique et son impact sur le monde.">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#333333">

    <!--animation facile -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <!--classes de webslide -->
    <link rel="stylesheet" href="css/webslides.css" >
    <!--pour la ré-écriture -->
    <link rel="stylesheet" href="css/style.css" >
    <!--pour les particules en fond -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    
    <!--icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon/favicon-16x16.png">
    <link rel="manifest" href="assets/images/favicon/site.webmanifest">
    <title>La dream team</title>
</head>

<body>

    <div id="particles-js"></div>

    <script>
        particlesJS.load('particles-js', 'assets/particles/particles.json', function(){
            console.log('particles.json chargé...')
        })
    </script>
      
    <main  role="main">
        <article id="webslides" class="vertical">
            <!-- Quick Guide
            - Each parent <section> in the <article id="webslides"> element is an individual slide.
            - Vertical sliding = <article id="webslides" class="vertical">
            - <div class="wrap"> = container 90% / <div class="wrap size-50"> = 45%;
            -->

            <!-- Slide 1 -->
             <section>
                <div class="wrap">
                    <h4 class="animate__animated animate__slideInDown"> Titre</h4>
                </div>
             </section>

             <!-- Slide 2 -->
             <section>
                <div class="wrap">
                    <h1> Slide 1 </h1>
                </div>
             </section>
        </article>
    </main>

    <script src="js/webslides.min.js" > </script>
    <script >
        globalThis.ws = new WebSlides({
            slideOffset: 15,        
            autoslide: false,       
            loop: false,            
            navigateOnScroll: true, 
            scrollingStep: 50,      
            startSlide: 1,          

            showIndex: false,       
            hash: true,             
            keyboard: true,         
            touch: true, 

            changeOnClick: false,   
            minWheelDelta: 40,      
            responsive: true,     
            });
    </script>

</body>

</html>
